<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Markdown Link | YouTube Link Service</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 1rem;
        }
        .glass-card { 
            background: rgba(255, 255, 255, 0.7); 
            -webkit-backdrop-filter: blur(12px); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 16px; padding: 2rem; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.1); 
            width: 100%; max-width: 450px; 
        }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { font-size: 0.875rem; color: #444; margin-bottom: 1.5rem; line-height: 1.4; }
        .input-group { margin-bottom: 1rem; }
        input[type="text"], textarea { 
            width: 100%; padding: 0.75rem; border: 1px solid rgba(0,0,0,0.1); 
            border-radius: 8px; box-sizing: border-box; background: rgba(255,255,255,0.5); font-size: 1rem; 
        }
        input:focus, textarea:focus { outline: none; border-color: #667eea; background: rgba(255,255,255,0.8); }
        .flex { display: flex; }
        .flex-col { flex-direction: column; }
        .items-center { align-items: center; }
        .gap-3 { gap: 0.75rem; }
        .mt-4 { margin-top: 1rem; }
        .auto-width { width: auto !important; }
        .btn { padding: 0.75rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s; font-size: 1rem; }
        .btn-primary { background: #667eea; color: white; box-shadow: 0 4px 6px rgba(102, 126, 234, 0.25); }
        .btn-secondary { background: #fff; color: #444; border: 1px solid rgba(0,0,0,0.1); }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }
        label { font-size: 0.9rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>YouTube Markdown Link</h1>
        <p>入力文字と YouTube URL から Markdown 形式のリンクを生成します<br />
            Generate a Markdown link from text and a YouTube URL.</p>

        <div class="input-group">
            <input type="text" id="linkText" placeholder="リンク文字列を入力 / Enter link text">
        </div>
        <div class="input-group">
            <input type="text" id="inputUrl" placeholder="YouTube URLを入力 / Enter YouTube URL">
        </div>

        <div class="input-group flex items-center gap-3">
            <input type="checkbox" id="timeOption" class="auto-width" checked>
            <label for="timeOption">時間パラメータ保持 / Keep time parameter</label>
        </div>

        <div class="flex flex-col gap-3">
            <button class="btn btn-primary" onclick="handleConvert()">Markdownに変換 / Convert</button>
            <button class="btn btn-secondary" onclick="handleCopy()">コピー / Copy</button>
        </div>

        <div class="mt-4">
            <textarea id="outputMarkdown" rows="3" readonly placeholder="Markdown形式で表示 / Markdown output"></textarea>
        </div>
    </div>

    <script>
        function isYouTubeHost(hostname) {
            return ['youtube.com', 'www.youtube.com', 'm.youtube.com'].includes(hostname);
        }

        function isMusicYouTubeHost(hostname) {
            return hostname === 'music.youtube.com';
        }

        function getYouTubeLink(input, keepTime) {
            try {
                const trimmedInput = input.trim();
                const videoIdPattern = /^[a-zA-Z0-9_-]{11}$/;

                if (videoIdPattern.test(trimmedInput)) {
                    return `https://youtu.be/${trimmedInput}`;
                }

                const u = new URL(trimmedInput);
                let videoId = null;
                let timeParam = '';

                if (keepTime) {
                    const t = u.searchParams.get('t');
                    const start = u.searchParams.get('start');
                    if (t) timeParam = '?t=' + t;
                    else if (start) timeParam = '?t=' + start;
                }

                if (u.hostname === 'youtu.be') {
                    videoId = u.pathname.slice(1);
                } else if ((u.hostname === 'img.youtube.com' || u.hostname === 'i.ytimg.com') && u.pathname.startsWith('/vi/')) {
                    const parts = u.pathname.split('/');
                    videoId = parts[2] || null;
                } else if (isMusicYouTubeHost(u.hostname) && u.pathname === '/watch') {
                    videoId = u.searchParams.get('v');
                } else if (isYouTubeHost(u.hostname)) {
                    if (u.pathname === '/watch') {
                        videoId = u.searchParams.get('v');
                    } else if (u.pathname.startsWith('/shorts/')) {
                        videoId = u.pathname.split('/')[2];
                    }
                }

                if (!videoId) return null;
                return `https://youtu.be/${videoId}${timeParam}`;
            } catch (e) {
                console.error('Markdown link processing failed:', e);
                return null;
            }
        }

        function handleConvert() {
            const linkText = document.getElementById('linkText').value.trim() || 'リンク';
            const inputUrl = document.getElementById('inputUrl').value;
            const timeOption = document.getElementById('timeOption').checked;
            const outputArea = document.getElementById('outputMarkdown');

            const link = getYouTubeLink(inputUrl, timeOption);
            if (!link) {
                outputArea.value = '無効なURL / Invalid URL';
            } else {
                outputArea.value = `${linkText}`;
            }
        }

        function handleCopy() {
            const outputArea = document.getElementById('outputMarkdown');
            const text = outputArea.value;

            if (text && text !== '無効なURL / Invalid URL') {
                navigator.clipboard.writeText(text).then(() => {
                    alert('Markdown copied!');
                }).catch(err => {
                    console.error('Failed to copy: ', err);
                });
            }
        }
    </script>
</body>
</html>
