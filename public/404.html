<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 - Not Found</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<style>
@import url('https://fonts.googleapis.com/css2?family=Potta+One&display=swap');

:root {
  --primary: #854c30;
  --primary-hover: #5c3521;
  --secondary: #d8c6a1;
  --background: #fdf6e3;
  --text-main: #3b2f2f;
  --glass-bg: rgba(255, 255, 255, 0.45);
  --glass-border: rgba(255, 255, 255, 0.6);
  --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
  --selection-bg: rgba(133, 76, 48, 0.35);
  --selection-text: #ffffff;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

::selection {
  background: var(--selection-bg);
  color: var(--selection-text);
}

body {
  background: var(--background);
  font-family: 'Potta One', Arial, sans-serif;
  color: var(--text-main);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}

.container {
  background: var(--glass-bg);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 3rem 2rem;
  max-width: 480px;
  width: 100%;
  box-shadow: var(--shadow);
  text-align: center;
}

h1 {
  font-size: 4rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.5rem;
  line-height: 1.1;
  letter-spacing: 0.04em;
}

p.message {
  font-size: 1.15rem;
  color: var(--text-main);
  margin-bottom: 2rem;
}

p.message span {
  font-size: 0.9em;
  opacity: 0.75;
}

a.back-btn {
  display: inline-block;
  background: var(--secondary);
  border-radius: 14px;
  color: var(--text-main);
  font-weight: 700;
  padding: 10px 24px;
  transition: all 0.2s ease;
  font-size: 1rem;
  text-decoration: none;
}

a.back-btn:hover {
  background: #c5b38f;
  transform: translateY(-1px);
}

.footer {
  font-size: 0.8rem;
  color: #5c4b3b;
  margin-top: 2rem;
  border-top: 1px solid rgba(59, 47, 47, 0.15);
  padding-top: 1rem;
  opacity: 0.9;
}

.footer a {
  color: var(--primary);
  text-decoration: none;
}

.footer a:hover {
  color: var(--primary-hover);
  text-decoration: underline;
}

@media (max-width: 480px) {
  .container { padding: 2rem 1.5rem; }
  h1 { font-size: 3rem; }
}
</style>
</head>
<body>
<div class="container">
  <h1>404</h1>
  <p class="message">ページが見つかりません<br><span>Sorry, Not Found.</span></p>
  <a id="backLink" class="back-btn" href="/">トップページへ戻る</a>
  <div class="footer" id="footer-copy"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  if (location.hostname === 'hamuzon.github.io') {
    document.getElementById('backLink').href = 'https://hamuzon.github.io/yt/';
  }
});

(function(){
  const baseYear = 2025;
  const currentYear = new Date().getFullYear();
  const hostname = location.hostname;
  const footer = document.getElementById('footer-copy');

  let yearStr = String(baseYear);
  if (currentYear > baseYear) {
    yearStr = `${baseYear}–${currentYear}`;
  } else if (currentYear < baseYear) {
    yearStr = `${currentYear}–${baseYear}`;
  }

  let footerHTML = `&copy; ${yearStr} YouTube Link`;
  if (hostname.includes('hamuzon-jp.f5.si')) {
    footerHTML = `&copy; ${yearStr} <a href="https://hamuzon-jp.f5.si" target="_blank" rel="noopener noreferrer">@hamuzon</a>`;
  } else if (hostname.includes('hamuzon.github.io')) {
    footerHTML = `&copy; ${yearStr} <a href="https://hamuzon.github.io" target="_blank" rel="noopener noreferrer">@hamuzon</a>`;
  } else if (hostname.includes('hamusata.f5.si')) {
    footerHTML = `&copy; ${yearStr} <a href="https://hamusata.f5.si" target="_blank" rel="noopener noreferrer">@hamusata</a>`;
  }

  if (footer) footer.innerHTML = footerHTML;
})();
</script>
</body>
</html>
